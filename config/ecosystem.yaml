# Configuracao do Ecossistema de Agentes AI
# ==========================================

ecosystem:
  name: "AI Agent Ecosystem"
  version: "0.1.0"
  language: "pt-br"
  log_level: "INFO"

# Agentes Principais
agents:
  orchestrator:
    enabled: true
    description: "Coordena todos os agentes do ecossistema"

  cientifico:
    enabled: true
    description: "Pesquisa e analise cientifica"
    research_areas:
      - artificial_intelligence
      - machine_learning
      - natural_language_processing
      - computer_vision
      - neuroscience
    sources:
      - arxiv
      - semantic_scholar
      - pubmed

  automacao:
    enabled: true
    description: "Automacao de tarefas e workflows"
    max_concurrent_tasks: 5
    retry_attempts: 3

  organizacao:
    enabled: true
    description: "Organizacao pessoal e gestao de tarefas"
    methodology: "GTD"  # Getting Things Done
    daily_task_limit: 5
    review_schedule: "weekly"

  atualizacao_ai:
    enabled: true
    description: "Monitoramento do ecossistema AI"
    check_interval_hours: 6
    monitored_sources:
      - name: "Anthropic Blog"
        url: "https://www.anthropic.com/news"
        type: "blog"
      - name: "OpenAI Blog"
        url: "https://openai.com/blog"
        type: "blog"
      - name: "Google AI Blog"
        url: "https://blog.google/technology/ai/"
        type: "blog"
      - name: "Hugging Face"
        url: "https://huggingface.co"
        type: "hub"
      - name: "Papers With Code"
        url: "https://paperswithcode.com"
        type: "papers"
      - name: "GitHub Trending"
        url: "https://github.com/trending"
        type: "code"

# Subagentes
subagents:
  web_monitor:
    enabled: true
    check_interval_minutes: 60
  data_pipeline:
    enabled: true
  trend_analyzer:
    enabled: true

# Skills
skills:
  research:
    - web_search
    - arxiv_search
    - summarizer
  coding:
    - code_analyzer
    - code_generator
  writing:
    - content_writer
  data:
    - data_processor
  devops:
    - git_manager

# Modelos AI Configurados
ai_models:
  primary:
    provider: "anthropic"
    model: "claude-opus-4-6"
    max_tokens: 8192
    role: "Analise profunda, sintese, decisoes criticas"
  fast:
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    role: "Processamento medio, sumarizacao, queries"
  triage:
    provider: "openai"
    model: "chatgpt-5.4"
    max_tokens: 4096
    role: "Triagem rapida, classificacao, filtragem"
  local:
    provider: "ollama"
    model: "llama3.3"
    max_tokens: 4096
    role: "Operacoes triviais (parsing, file ops, SQL)"

# MCP Servers - Routing por Modelo
# Definicao completa em config/mcp/servers.json
mcp_routing:
  # 5.4 = triagem barata | Sonnet = medio | Opus = profundo | Local = trivial
  # Notion = Opus direto ($0 via Pro/Max, ja pago)
  claude_opus_free:  # $0.00 - incluso no Claude Pro/Max
    - "notion:all"             # Opus pra tudo - ler, classificar, escrever, organizar

  chatgpt_5_4:  # ~$0.005/call (so quando via API separada)
    - "healthcare-mcp:search_filter"
    - "pubmed-mcp:search_triage"
    - "gmail:read_classify"
    - "github:read_triage"
    - "fetch:fetch_parse"
    - "brave-search:search_filter"

  claude_sonnet:  # ~$0.01/call (so quando via API separada)
    - "healthcare-mcp:extract_data"
    - "pubmed-mcp:summarize_abstract"
    - "biomcp:query"
    - "gmail:summarize"
    - "context7:all"
    - "brave-search:analyze"
    - "memory:synthesize"

  claude_opus:  # ~$0.05-0.10/call (so quando via API separada)
    - "healthcare-mcp:analyze_evidence"
    - "pubmed-mcp:systematic_review"
    - "biomcp:interpret"
    - "gmail:compose"
    - "github:code_review"

  local_ollama:  # $0.00
    - "filesystem:all"
    - "sqlite:all"
    - "memory:store_retrieve"

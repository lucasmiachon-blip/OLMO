# Configuracao do Ecossistema de Agentes AI
# ==========================================

ecosystem:
  name: "AI Agent Ecosystem"
  version: "0.1.0"
  language: "pt-br"
  log_level: "INFO"

# Agentes Principais
agents:
  orchestrator:
    enabled: true
    model: "claude-opus-4-6"
    role: "routing"
    description: "Coordena todos os agentes do ecossistema"
    budget_tracker: true

  cientifico:
    enabled: true
    model: "claude-sonnet-4-6"
    description: "Pesquisa e analise cientifica"
    subagents: ["trend_analyzer"]
    research_areas:
      - artificial_intelligence
      - machine_learning
      - natural_language_processing
      - medicina_baseada_em_evidencias
    sources:
      - arxiv
      - semantic_scholar
      - pubmed

  automacao:
    enabled: true
    model: "claude-haiku-4-5"
    description: "Automacao de tarefas e workflows"
    subagents: ["data_pipeline"]
    max_concurrent_tasks: 5
    retry_reads: 3
    retry_writes: 0  # Writes NUNCA retry (mcp_safety.md)

  organizacao:
    enabled: true
    model: "claude-sonnet-4-6"
    description: "Organizacao pessoal e gestao de tarefas"
    subagents: ["knowledge_organizer"]
    methodology: "GTD"  # Getting Things Done
    daily_task_limit: 5
    review_schedule: "weekly"

  atualizacao_ai:
    enabled: true
    model: "claude-sonnet-4-6"
    description: "Monitoramento do ecossistema AI"
    subagents: ["web_monitor"]
    check_interval_hours: 6
    monitored_sources:
      - name: "Anthropic Blog"
        url: "https://www.anthropic.com/news"
        type: "blog"
      - name: "OpenAI Blog"
        url: "https://openai.com/blog"
        type: "blog"
      - name: "Google AI Blog"
        url: "https://blog.google/technology/ai/"
        type: "blog"
      - name: "Hugging Face"
        url: "https://huggingface.co"
        type: "hub"
      - name: "Papers With Code"
        url: "https://paperswithcode.com"
        type: "papers"
      - name: "GitHub Trending"
        url: "https://github.com/trending"
        type: "code"

# Subagentes
subagents:
  web_monitor:
    enabled: true
    model: "claude-haiku-4-5"
    parent: "atualizacao_ai"
    check_interval_minutes: 60
  data_pipeline:
    enabled: true
    model: "claude-haiku-4-5"
    parent: "automacao"
  trend_analyzer:
    enabled: true
    model: "claude-haiku-4-5"
    parent: "cientifico"
  knowledge_organizer:
    enabled: true
    model: "claude-sonnet-4-6"
    parent: "organizacao"
    description: "Integra Notion + Obsidian + Zotero para knowledge management"
  notion_cleaner:
    enabled: true
    model: "claude-sonnet-4-6"
    parent: "organizacao"
    description: "Limpa e organiza Notion com seguranca (modelo harsh)"

# Skills (.claude/skills/ — 20 ativas)
skills:
  # Pesquisa e ciencia
  scientific:
    path: ".claude/skills/scientific"
    description: "Pesquisa cientifica, hipoteses, literature review"
  medical-research:
    path: ".claude/skills/medical-research"
    description: "PubMed, PICO, niveis de evidencia"
  mbe-evidence:
    path: ".claude/skills/mbe-evidence"
    description: "GRADE, CONSORT, STROBE, PRISMA, RoB2, QUADAS"
  research:
    path: ".claude/skills/research"
    description: "Web search, fontes, analise de resultados"

  # Notion e organizacao
  notion-publisher:
    path: ".claude/skills/notion-publisher"
    description: "Templates Notion com estetica profissional"
  notion-knowledge-capture:
    path: ".claude/skills/notion-knowledge-capture"
    description: "Conversa/pesquisa → Masterpiece DB"
  notion-spec-to-impl:
    path: ".claude/skills/notion-spec-to-impl"
    description: "Specs → tasks no Notion Tasks DB"
  organization:
    path: ".claude/skills/organization"
    description: "GTD, Eisenhower, memory, task management"

  # Ensino e concurso
  teaching:
    path: ".claude/skills/teaching"
    description: "Metodologia de ensino, andragogia, slideologia, diario docente"
  concurso:
    path: ".claude/skills/concurso"
    description: "Prep concurso nov/2026, Anki AI, evidence-based learning"
  ai-fluency:
    path: ".claude/skills/ai-fluency"
    description: "AI fluency para ensino + dev AI continuo"
  exam-generator:
    path: ".claude/skills/exam-generator"
    description: "Simulados calibrados por bancas, Anki cards"
  continuous-learning:
    path: ".claude/skills/continuous-learning"
    description: "Aprendizado progressivo dev/ML/AI ops"

  # Automacao e infra
  automation:
    path: ".claude/skills/automation"
    description: "Regras, pipelines, cron, workflows"
  ai-monitoring:
    path: ".claude/skills/ai-monitoring"
    description: "Tracking modelos, tools, benchmarks"
  review:
    path: ".claude/skills/review"
    description: "Code review multi-agente + OWASP LLM Top 10"

  # Diario
  daily-briefing:
    path: ".claude/skills/daily-briefing"
    description: "Gmail → classificar → Notion Emails Digest DB"

  # Meta-skills
  skill-creator:
    path: ".claude/skills/skill-creator"
    description: "Meta-skill para criar/refinar skills"
  janitor:
    path: ".claude/skills/janitor"
    description: "Limpeza e manutencao do repositorio"
  self-evolving:
    path: ".claude/skills/self-evolving"
    description: "Auto-evolucao PDCA do ecossistema"

# Modelos AI Configurados
ai_models:
  primary:
    provider: "anthropic"
    model: "claude-opus-4-6"
    max_tokens: 8192
    role: "Analise profunda, sintese, decisoes criticas"
  fast:
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    max_tokens: 4096
    role: "Processamento medio, sumarizacao, queries"
  simple:
    provider: "anthropic"
    model: "claude-haiku-4-5"
    max_tokens: 4096
    role: "Tarefas simples, automacao, pipelines, subagentes"
  triage:
    provider: "openai"
    model: "chatgpt-5.4"
    max_tokens: 4096
    role: "Triagem rapida, classificacao, filtragem"
  local:
    provider: "ollama"
    model: "llama3.3"
    max_tokens: 4096
    role: "Operacoes triviais (parsing, file ops, SQL)"

# MCP Servers - Routing por Modelo
# Definicao completa em config/mcp/servers.json
mcp_routing:
  # 5.4 = triagem barata | Sonnet = medio | Opus = profundo | Local = trivial
  # Notion = Opus direto ($0 via Pro/Max, ja pago)
  claude_opus_free:  # $0.00 - incluso no Claude Pro/Max
    - "notion:all"             # Opus pra tudo - ler, classificar, escrever, organizar

  chatgpt_5_4:  # ~$0.005/call (so quando via API separada)
    - "healthcare-mcp:search_filter"
    - "pubmed-mcp:search_triage"
    - "gmail:read_classify"
    - "github:read_triage"
    - "fetch:fetch_parse"
    - "brave-search:search_filter"

  claude_sonnet:  # ~$0.01/call (so quando via API separada)
    - "healthcare-mcp:extract_data"
    - "pubmed-mcp:summarize_abstract"
    - "biomcp:query"
    - "gmail:summarize"
    - "context7:all"
    - "brave-search:analyze"
    - "memory:synthesize"

  claude_opus:  # ~$0.05-0.10/call (so quando via API separada)
    - "healthcare-mcp:analyze_evidence"
    - "pubmed-mcp:systematic_review"
    - "biomcp:interpret"
    - "gmail:compose"
    - "github:code_review"

  local_ollama:  # $0.00
    - "filesystem:all"
    - "sqlite:all"
    - "memory:store_retrieve"

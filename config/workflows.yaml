# Definicoes de Workflows Automatizados
# ======================================

workflows:
  # Workflow: Revisao Matinal
  morning_review:
    name: "Revisao Matinal"
    description: "Revisao diaria automatica para comecar o dia organizado"
    trigger: "cron"
    schedule: "0 7 * * *"  # 7h todos os dias
    budget_tracking: true
    cache: { key: "morning_digest", ttl_hours: 6 }
    steps:
      - agent: "atualizacao_ai"
        action: "news_digest"
        model_tier: "simple"  # Haiku — buscar headlines
        description: "Buscar novidades de AI"
      - agent: "organizacao"
        action: "plan_day"
        model_tier: "medium"  # Sonnet — planejar
        description: "Criar plano do dia"
      - agent: "cientifico"
        action: "find_trends"
        model_tier: "simple"  # Haiku — filtrar tendencias
        area: "artificial_intelligence"
        description: "Verificar tendencias"

  # Workflow: Revisao Semanal (GTD)
  weekly_review:
    name: "Revisao Semanal GTD"
    description: "Revisao semanal completa no estilo Getting Things Done"
    trigger: "cron"
    schedule: "0 18 * * 5"  # Sexta 18h
    budget_tracking: true
    steps:
      - agent: "organizacao"
        action: "inbox_process"
        model_tier: "medium"  # Sonnet
        description: "Processar inbox"
      - agent: "organizacao"
        action: "review_week"
        model_tier: "medium"
        description: "Revisar semana"
      - agent: "organizacao"
        action: "plan_week"
        model_tier: "medium"
        description: "Planejar proxima semana"
      - agent: "cientifico"
        action: "summarize"
        model_tier: "medium"
        topic: "weekly_learnings"
        description: "Sumarizar aprendizados"

  # Workflow: Pesquisa Cientifica
  research_pipeline:
    name: "Pipeline de Pesquisa"
    description: "Pesquisa cientifica completa sobre um topico"
    trigger: "manual"
    budget_tracking: true
    steps:
      - agent: "cientifico"
        action: "search"
        model_tier: "triage"  # Sonnet — busca inicial
        description: "Buscar papers"
      - subagent: "trend_analyzer"
        action: "analyze"
        model_tier: "simple"  # Haiku — analisar tendencias
        description: "Analisar tendencias nos resultados"
      - agent: "cientifico"
        action: "literature_review"
        model_tier: "deep"    # Opus — analise profunda
        description: "Criar revisao de literatura"
      - agent: "cientifico"
        action: "generate_hypothesis"
        model_tier: "deep"    # Opus — raciocinio complexo
        description: "Gerar hipoteses"

  # Workflow: Monitoramento AI
  ai_monitoring:
    name: "Monitoramento AI"
    description: "Monitoramento continuo do ecossistema AI"
    trigger: "cron"
    schedule: "0 */6 * * *"  # A cada 6 horas (4x/dia = ~16 calls/dia)
    budget_tracking: true
    estimated_cost_per_run: 0.05  # ~$0.20/dia
    steps:
      - subagent: "web_monitor"
        action: "check_all"
        model_tier: "simple"  # Haiku — scraping basico
        description: "Verificar todas as fontes"
      - agent: "atualizacao_ai"
        action: "check_updates"
        model_tier: "medium"  # Sonnet — processar
        description: "Processar atualizacoes"
      - agent: "atualizacao_ai"
        action: "compare_models"
        model_tier: "medium"  # Sonnet — comparar
        description: "Comparar novos modelos"
      - subagent: "trend_analyzer"
        action: "analyze"
        model_tier: "simple"  # Haiku — tendencias
        description: "Analisar tendencias"

  # Workflow: Code Review Automatizado
  code_review:
    name: "Code Review Automatizado"
    description: "Review automatico de qualidade de codigo"
    trigger: "event"
    event: "git_push"
    budget_tracking: true
    steps:
      - skill: "code_analyzer"
        action: "analyze_project"
        description: "Analisar projeto"
      - skill: "code_analyzer"
        action: "security_scan"
        description: "Scan de seguranca"
      - skill: "content_writer"
        action: "write"
        content_type: "report"
        description: "Gerar relatorio"

  # Workflow: Limpeza Notion (seguro, com aprovacao humana)
  # IMPORTANTE: Segue protocolo mcp_safety.md rigorosamente
  # - NAO existe API de move (#64) → usar workaround: create+copy+verify+archive
  # - UMA operacao por vez (#74) → nunca batch automatico
  # - Cross-validation obrigatoria para classificacao/relocacao
  # - Aprovacao humana entre fases de audit e execucao
  notion_cleanup:
    name: "Limpeza Notion"
    description: "Varre Notion pagina por pagina, organiza, remove duplicatas"
    trigger: "manual"
    model_tier: "medium"  # Sonnet para triagem, Opus se ambiguo
    background: false  # NUNCA background — requer checkpoints humanos
    requires_human_approval: true  # Gate entre audit e execute
    mcp_safety: "strict"  # Referencia: .claude/rules/mcp_safety.md
    steps:
      # FASE 1: AUDIT (READ-ONLY — token read-only)
      - agent: "organizacao"
        action: "notion_audit"
        mode: "read_only"
        description: "Varrer todas as paginas e classificar (READ-ONLY)"
      - agent: "organizacao"
        action: "identify_duplicates"
        mode: "read_only"
        description: "Identificar duplicatas (READ-ONLY, sem resolver)"

      # CHECKPOINT: Apresentar relatorio ao humano para aprovacao
      - action: "human_review"
        description: "Apresentar achados ao usuario para aprovacao antes de writes"

      # FASE 2: EXECUTE (token read-write, UMA operacao por vez)
      # Cross-validation obrigatoria para cada classificacao/relocacao
      - agent: "organizacao"
        action: "deduplicate_approved"
        mode: "write_one_at_a_time"
        cross_validation: true  # Claude + ChatGPT 5.4
        description: "Resolver duplicatas aprovadas (1 por vez, com verificacao)"
      - agent: "organizacao"
        action: "safe_relocate"
        mode: "write_one_at_a_time"
        cross_validation: true
        description: "Relocar via workaround: create → copy → verify → archive original"
        # NAO existe API de move (#64). Workaround seguro:
        # 1. READ pagina original (snapshot)
        # 2. CREATE nova pagina no destino
        # 3. VERIFY nova pagina (comparar)
        # 4. ARCHIVE original (soft-delete, reversivel)
      - agent: "organizacao"
        action: "fill_tags"
        mode: "write_one_at_a_time"
        description: "Preencher tags e propriedades faltantes (1 por vez)"
      - agent: "organizacao"
        action: "archive_obsolete"
        mode: "write_one_at_a_time"
        cross_validation: true
        description: "Arquivar conteudo obsoleto (NUNCA deletar, apenas archive)"

      # FASE 3: VERIFICACAO
      - agent: "organizacao"
        action: "verify_all_writes"
        mode: "read_only"
        description: "Re-ler todas as paginas modificadas e confirmar resultado"
      - agent: "organizacao"
        action: "generate_report"
        description: "Gerar relatorio final (executado + pendente + flags)"

  # Workflow: Organizacao Completa
  full_organization:
    name: "Organizacao Completa"
    description: "Reorganizacao completa de tarefas e projetos"
    trigger: "manual"
    budget_tracking: true
    model_tier: "medium"  # Sonnet para todas as tarefas de organizacao
    steps:
      - agent: "organizacao"
        action: "inbox_process"
        description: "Processar inbox"
      - agent: "organizacao"
        action: "prioritize"
        description: "Priorizar tarefas (Eisenhower)"
      - agent: "organizacao"
        action: "status_report"
        description: "Gerar relatorio de status"
      - agent: "organizacao"
        action: "plan_week"
        description: "Criar plano semanal"

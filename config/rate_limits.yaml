# Configuracao de Rate Limits e Budget
# =====================================
# Otimizado para poucos requests por dia/semana
# Baseado em: Simon Willison ($0.61/projeto), Anthropic max_budget_usd

budget:
  daily:
    max_requests: 10
    max_cost_usd: 1.00
    alert_threshold: 0.80  # Alerta em 80% do limite

  weekly:
    max_requests: 50
    max_cost_usd: 5.00
    alert_threshold: 0.80

  monthly:
    max_requests: 150
    max_cost_usd: 15.00

# Priorizacao de tarefas por tier
priority_tiers:
  critical:
    description: "Executa sempre, ignora limites"
    examples: ["alertas de seguranca", "bugs em producao"]
    max_cost_per_call: 0.50

  high:
    description: "Executa se tiver budget"
    examples: ["pesquisa principal", "code review"]
    max_cost_per_call: 0.20

  medium:
    description: "Batcha com outras tarefas"
    examples: ["resumos", "organizacao diaria", "digest"]
    max_cost_per_call: 0.10

  low:
    description: "Defer para quando houver budget sobrando"
    examples: ["tendencias", "curiosidades", "exploracoes"]
    max_cost_per_call: 0.05

  background:
    description: "Usa modelo local ou espera reset"
    examples: ["formatacao", "parsing", "classificacao simples"]
    max_cost_per_call: 0.00  # Deve ser gratis (local)

# Estrategia de modelos por complexidade
# Inspirado em CrewAI: "modelo certo para a tarefa certa"
model_routing:
  trivial:
    model: "local-ollama"        # Custo: $0.00
    use_for: ["formatacao", "regex", "parsing", "classificacao simples"]

  simple:
    model: "claude-haiku-4-5"    # Custo: ~$0.001/call
    use_for: ["extracao de dados", "respostas curtas", "triagem"]

  medium:
    model: "claude-sonnet-4-6"   # Custo: ~$0.01/call
    use_for: ["sumarizacao", "codigo simples", "analise basica"]

  complex:
    model: "claude-opus-4-6"     # Custo: ~$0.05-0.10/call
    use_for: ["pesquisa profunda", "codigo complexo", "raciocinio", "hipoteses"]

# Cache
caching:
  enabled: true
  default_ttl_hours: 24
  max_cache_size_mb: 100

  # TTL por tipo de conteudo
  ttl_by_type:
    news_digest: 6          # Noticias: 6h
    paper_search: 48         # Papers: 48h (mudam pouco)
    model_comparison: 168    # Comparacao de modelos: 1 semana
    code_analysis: 24        # Analise de codigo: 24h
    task_planning: 12        # Planejamento: 12h
    trend_analysis: 72       # Tendencias: 3 dias

# Batching
batching:
  enabled: true
  max_batch_size: 5           # Max tarefas por batch
  batch_wait_minutes: 30      # Espera acumular por 30min
  batch_keys:
    - "morning_digest"        # Combina news + trends + planning
    - "research_batch"        # Combina multiplas buscas
    - "organization_batch"    # Combina tarefas de organizacao

# Fallback entre provedores (inspirado em Portkey AI Gateway)
fallback:
  enabled: true
  chain:
    - provider: "anthropic"
      model: "claude-sonnet-4-6"
    - provider: "openai"
      model: "gpt-4o-mini"
    - provider: "local"
      model: "ollama/llama3"

  # Quando usar fallback
  triggers:
    - "rate_limit_exceeded"
    - "budget_exhausted"
    - "provider_unavailable"

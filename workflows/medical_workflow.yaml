# Workflow Medico Principal
# =========================
# Paper/Nota → Busca → Critica MBE → Notion Bonito
# Orquestrador: Opus 4.6 | Auditor: ChatGPT 5.4

# ============================================================
# WORKFLOW PRINCIPAL: Paper-to-Notion Pipeline
# ============================================================

workflows:
  paper_to_notion:
    name: "Paper → Analise MBE → Notion"
    description: |
      Recebe uma nota, paper ou topico medico.
      Dispara buscas em PubMed/Scite/Consensus/Elicit.
      Analisa criticamente com MBE profissional.
      Popula pagina Notion com estetica e qualidade.
    trigger: "manual"
    orchestrator: "claude-opus-4-6"
    estimated_calls: 3-5

    steps:
      # Step 1: PARSE INPUT (Local - $0)
      - name: "parse_input"
        type: "local"
        action: |
          Receber input do usuario (nota, paper, topico)
          Extrair: topico principal, subtopicos, pergunta clinica
          Formular PICO se possivel
          Identificar especialidade medica
        cost: "$0.00"

      # Step 2: BUSCA AMPLA via MCPs (MCP - $0)
      - name: "pubmed_search"
        type: "mcp"
        servers:
          - "healthcare-mcp"   # PubMed + ClinicalTrials + FDA
          - "pubmed-mcp"       # Busca avancada com MeSH
          - "biomcp"           # Queries em linguagem natural
        action: |
          Buscar em PubMed por MeSH terms relevantes
          Filtrar: ultimos 5 anos, humanos, idioma
          Priorizar: RCTs, meta-analises, guidelines
          Buscar ClinicalTrials.gov para trials ativos
        max_results: 20
        cost: "$0.00 (MCP)"

      # Step 3: DEEP DIVE com ferramentas externas
      - name: "evidence_verification"
        type: "api_call"
        model: "claude-opus-4-6"
        action: |
          Atuar como especialista MBE senior.

          Para cada paper relevante:
          1. Classificar nivel de evidencia (Oxford CEBM)
          2. Aplicar checklist CASP
          3. Extrair dados PICO
          4. Identificar vieses e limitacoes

          Usar como referencia:
          - Scite (scite.ai): verificar citacoes suporte vs contraste
          - Consensus (consensus.app): verificar consenso cientifico
          - Elicit (elicit.com): extracoes estruturadas

          Sintetizar com grau de recomendacao (A-D)
        cost: "~$0.05-0.10"

      # Step 4: CRITICA CRUZADA (Opcional - Auditor)
      - name: "cross_validation"
        type: "api_call"
        model: "gpt-5.4"  # ChatGPT como auditor
        optional: true
        when: "evidencia ambigua ou decisao critica"
        action: |
          Segunda opiniao sobre a analise MBE:
          - Concordancia com grau de recomendacao?
          - Algum estudo importante esquecido?
          - Vieses nao identificados?
          - Perspectiva diferente?
        cost: "~$0.02-0.05"

      # Step 5: PUBLICAR NO NOTION (MCP - $0)
      - name: "publish_to_notion"
        type: "mcp"
        server: "notion"
        action: |
          Criar pagina no Notion usando template MBE:
          - Titulo com emoji medico
          - PICO em tabela
          - Conclusao principal em callout
          - Tabela comparativa dos estudos
          - Analise critica com checkmarks
          - Scite citation check
          - Referencias com PMID
          - Estrategia de busca documentada
          - Tag de nivel de evidencia
        template: "resumo_evidencias_medicas"
        database: "Knowledge Base Medica"
        cost: "$0.00 (MCP)"

  # ============================================================
  # DIGEST SEMANAL TIER 1
  # ============================================================

  weekly_medical_digest:
    name: "Digest Medico Semanal Tier 1"
    description: |
      1 vez por semana: busca as melhores evidencias novas
      da sua especialidade e publica no Notion
    trigger: "cron"
    schedule: "0 8 * * 1"  # Segunda 8h
    orchestrator: "claude-opus-4-6"
    estimated_calls: 2

    steps:
      # Step 1: Buscar novidades (MCP - $0)
      - name: "search_new_evidence"
        type: "mcp"
        servers: ["pubmed-mcp", "healthcare-mcp"]
        action: |
          Buscar papers publicados na ultima semana:
          - Filtro: sua especialidade + subtopicos
          - Tipo: RCTs, meta-analises, guidelines
          - Ordenar por relevancia e impacto
        cost: "$0.00"

      # Step 2: Analisar e ranquear (1 API call batched)
      - name: "analyze_and_rank"
        type: "api_call"
        model: "claude-opus-4-6"
        action: |
          Analisar os 20 papers encontrados:
          1. Classificar nivel de evidencia
          2. Avaliar relevancia pratica (1-10)
          3. Selecionar TOP 3 mais impactantes
          4. Resumir cada um em 2 frases + numeros
          5. Verificar guidelines atualizadas
          6. Listar trials clinicos novos relevantes
        cost: "~$0.05-0.10"

      # Step 3: Publicar digest no Notion (MCP - $0)
      - name: "publish_digest"
        type: "mcp"
        server: "notion"
        action: |
          Criar pagina de digest semanal no Notion:
          - Template: Digest Medico Semanal
          - Top 3 evidencias com detalhes
          - Guidelines atualizadas
          - Trials em andamento
          - Leitura recomendada
        template: "digest_semanal_medico"
        cost: "$0.00"

  # ============================================================
  # AUTOMACAO GMAIL → NOTION
  # ============================================================

  gmail_to_notion:
    name: "Gmail → Analise → Notion"
    description: |
      Monitora Gmail para newsletters medicas e papers
      Processa automaticamente e publica no Notion
    trigger: "cron"
    schedule: "0 12 * * *"  # Meio-dia
    estimated_calls: 1

    steps:
      # Step 1: Buscar emails medicos (MCP - $0)
      - name: "scan_gmail"
        type: "mcp"
        server: "gmail"
        action: |
          Buscar emails das ultimas 24h com labels:
          - "Medical/Newsletters"
          - "Medical/Papers"
          - "Medical/Alerts"
          Extrair: assunto, remetente, corpo, links, PDFs
        cost: "$0.00"

      # Step 2: Triagem e analise (1 API call)
      - name: "triage_and_analyze"
        type: "api_call"
        model: "claude-sonnet-4-6"  # Sonnet para triagem
        action: |
          Para cada email medico:
          1. Classificar relevancia (alta/media/baixa)
          2. Extrair papers/links citados
          3. Resumir em 1-2 frases
          4. Se alta relevancia: disparar paper_to_notion
        cost: "~$0.01"

      # Step 3: Publicar resumo no Notion (MCP - $0)
      - name: "publish_email_digest"
        type: "mcp"
        server: "notion"
        action: |
          Adicionar ao database "Inbox Medico" no Notion:
          - Fonte do email
          - Resumo
          - Links para papers
          - Status: "Para Revisar" / "Arquivado"
        cost: "$0.00"

  # ============================================================
  # NOTA RAPIDA → NOTION
  # ============================================================

  quick_note_to_evidence:
    name: "Nota Rapida → Evidencia → Notion"
    description: |
      Voce anota algo rapido (ex: "metformina e cancer?")
      O sistema busca, analisa e publica no Notion
    trigger: "manual"
    estimated_calls: 2

    steps:
      - name: "parse_note"
        type: "local"
        action: "Extrair topico e formular pergunta PICO"
        cost: "$0.00"

      - name: "search_evidence"
        type: "mcp"
        servers: ["pubmed-mcp", "healthcare-mcp"]
        action: "Buscar evidencias no PubMed"
        cost: "$0.00"

      - name: "analyze_and_publish"
        type: "api_call"
        model: "claude-opus-4-6"
        action: |
          Analisar evidencias encontradas:
          - Nivel de evidencia
          - Numeros concretos (NNT, RR, IC)
          - Conclusao pratica

          Formatar como Quick Reference e publicar no Notion
        cost: "~$0.05-0.10"

      - name: "publish_notion"
        type: "mcp"
        server: "notion"
        template: "nota_clinica_rapida"
        cost: "$0.00"

# ============================================================
# FERRAMENTAS EXTERNAS (Usar via Browser/Manual)
# ============================================================
#
# Scite.ai    → Verificar citacoes (suporte vs contraste)
#               scite.ai/search?q=[topico]
#               API disponivel para integracao futura
#
# Consensus   → Verificar consenso cientifico
#               consensus.app/search?q=[pergunta]
#               250M+ papers, meter de consenso
#
# Elicit      → Extracao estruturada PICO
#               elicit.com
#               Tabelas comparativas automaticas
#
# ============================================================
# BUDGET MENSAL ESTIMADO (Workflow Medico)
# ============================================================
#
# Workflow                     | Calls/mes | Custo
# -----------------------------|-----------|--------
# Paper-to-Notion (~4x/mes)    | 12-20     | $0.60-1.00
# Digest Semanal (4x/mes)      | 8         | $0.40
# Gmail-to-Notion (30x/mes)    | 30        | $0.30
# Quick Notes (~8x/mes)        | 16        | $0.80
# Cross-validation (~2x/mes)   | 4         | $0.10
# -----------------------------|-----------|--------
# TOTAL MENSAL                  | 70-78     | $2.20-2.60
#
# + MCPs (PubMed, Notion, Gmail) = $0.00
# TOTAL REAL: ~$2.50/mes para ecossistema medico completo

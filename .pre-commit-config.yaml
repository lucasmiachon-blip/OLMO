repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
  - repo: local
    hooks:
      - id: guard-secrets
        name: Scan staged files for secrets
        entry: bash .claude/hooks/guard-secrets-precommit.sh
        language: system
        stages: [pre-commit]
      - id: crossref-check
        name: Cross-ref co-modification check
        entry: bash .claude/hooks/crossref-precommit.sh
        language: system
        stages: [pre-commit]
        pass_filenames: false
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^content/aulas/
      - id: ruff-format
        exclude: ^content/aulas/
